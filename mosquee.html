<!DOCTYPE html>
<html lang="fr" dir="ltr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mosquée Bilal - Galerie</title>
    <link rel="stylesheet" href="styles.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
      integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
  </head>
  <body class="page-single mosquee-page">
    <div class="mosquee-page-bg" aria-hidden="true"></div>
    <header class="main-header">
      <div class="logo-area">
        <img src="assets/logo.png" alt="Mosquée Bilal" class="logo-photo" />
        <div class="logo-text">
          <span class="logo-title" data-i18n="siteTitle">Mosquée Bilal</span>
          <span class="logo-subtitle" data-i18n="siteSubtitle">Lumière, savoir et sérénité</span>
        </div>
      </div>
      <nav class="main-nav">
        <button class="nav-toggle" aria-label="Menu">
          <span></span><span></span><span></span>
        </button>
        <ul>
          <li><a href="index.html" data-i18n="navHome">Accueil</a></li>
          <li><a href="mosquee.html" data-i18n="navGallery">Galerie</a></li>
          <li><a href="donation.html" data-i18n="navDonation" class="nav-donate">Don</a></li>
          <li><a href="location.html" data-i18n="navLocation">Localisation</a></li>
          <li><a href="social.html" data-i18n="navSocial">Réseaux</a></li>
          <li><a href="contact.html" data-i18n="navContact">Contact</a></li>
        </ul>
      </nav>
      <div class="lang-switch">
        <button data-lang="fr" class="active">FR</button>
        <button data-lang="ar">العربية</button>
      </div>
    </header>

    <div style="background:linear-gradient(90deg,#c9a84c,#2d6a4f,#c9a84c);background-size:200%;animation:gradientMove 3s infinite;text-align:center;padding:12px;color:white;font-weight:700;font-size:1rem;letter-spacing:1px;">
      🕌 Aidez-nous à achever la Mosquée Bilal ! 
      <a href="donation.html" style="background:white;color:#2d6a4f;padding:5px 15px;border-radius:20px;margin-left:10px;font-weight:800;text-decoration:none;">FAIRE UN DON ❤️</a>
    </div>

    <main>
      <section class="mosquee-gallery-section">
        <header class="mosquee-gallery-header">
          <h1 class="mosquee-gallery-title">Mosquée Bilal — Vue en grand</h1>
          <div class="mosquee-gallery-title-line"></div>
          <p class="mosquee-gallery-subtitle">
            Parcourez les photos de la Mosquée Bilal en plein écran.
          </p>
        </header>

        <div class="mosquee-masonry-grid">
          <figure class="mosquee-masonry-item">
            <div class="mosquee-masonry-inner">
              <img src="assets/mosquee-1.png" alt="Mosquée Bilal - Vue 1" />
              <div class="mosquee-masonry-overlay">
                <i class="fa-solid fa-magnifying-glass mosquee-masonry-zoom-icon" aria-hidden="true"></i>
              </div>
            </div>
          </figure>

          <figure class="mosquee-masonry-item">
            <div class="mosquee-masonry-inner">
              <img src="assets/mosquee-2.png" alt="Mosquée Bilal - Vue 2" />
              <div class="mosquee-masonry-overlay">
                <i class="fa-solid fa-magnifying-glass mosquee-masonry-zoom-icon" aria-hidden="true"></i>
              </div>
            </div>
          </figure>

          <figure class="mosquee-masonry-item">
            <div class="mosquee-masonry-inner">
              <img src="assets/mosquee-3.png" alt="Mosquée Bilal - Vue 3" />
              <div class="mosquee-masonry-overlay">
                <i class="fa-solid fa-magnifying-glass mosquee-masonry-zoom-icon" aria-hidden="true"></i>
              </div>
            </div>
          </figure>

          <figure class="mosquee-masonry-item">
            <div class="mosquee-masonry-inner">
              <img src="assets/mosquee-4.png" alt="Mosquée Bilal - Vue 4" />
              <div class="mosquee-masonry-overlay">
                <i class="fa-solid fa-magnifying-glass mosquee-masonry-zoom-icon" aria-hidden="true"></i>
              </div>
            </div>
          </figure>

          <figure class="mosquee-masonry-item">
            <div class="mosquee-masonry-inner">
              <img src="assets/0f6a9d6c634af4105d3f326479678f5af75ab3ba.png" alt="Mosquée Bilal - Vue 5" />
              <div class="mosquee-masonry-overlay">
                <i class="fa-solid fa-magnifying-glass mosquee-masonry-zoom-icon" aria-hidden="true"></i>
              </div>
            </div>
          </figure>

          <figure class="mosquee-masonry-item">
            <div class="mosquee-masonry-inner">
              <img src="assets/1.png" alt="Mosquée Bilal - Vue 6" />
              <div class="mosquee-masonry-overlay">
                <i class="fa-solid fa-magnifying-glass mosquee-masonry-zoom-icon" aria-hidden="true"></i>
              </div>
            </div>
          </figure>

          <figure class="mosquee-masonry-item">
            <div class="mosquee-masonry-inner">
              <img src="assets/3fb9465c945bc88e2378d10fbaa941745d03276a2.png" alt="Mosquée Bilal - Vue 7" />
              <div class="mosquee-masonry-overlay">
                <i class="fa-solid fa-magnifying-glass mosquee-masonry-zoom-icon" aria-hidden="true"></i>
              </div>
            </div>
          </figure>

          <figure class="mosquee-masonry-item">
            <div class="mosquee-masonry-inner">
              <img src="assets/4be675200f3e16cbaa1b15220c185955a12f19b5.png" alt="Mosquée Bilal - Vue 8" />
              <div class="mosquee-masonry-overlay">
                <i class="fa-solid fa-magnifying-glass mosquee-masonry-zoom-icon" aria-hidden="true"></i>
              </div>
            </div>
          </figure>

          <figure class="mosquee-masonry-item">
            <div class="mosquee-masonry-inner">
              <img src="assets/76b2829bbaaa6baab6ec2756088350ce11fc8b43.png" alt="Mosquée Bilal - Vue 9" />
              <div class="mosquee-masonry-overlay">
                <i class="fa-solid fa-magnifying-glass mosquee-masonry-zoom-icon" aria-hidden="true"></i>
              </div>
            </div>
          </figure>
        </div>
      </section>

      <div class="gallery-lightbox" id="gallery-lightbox" aria-hidden="true">
        <div class="gallery-lightbox-backdrop"></div>
        <div class="gallery-lightbox-inner">
          <button
            class="gallery-lightbox-close"
            type="button"
            aria-label="Fermer l’image"
          >
            ✕
          </button>
          <button
            class="gallery-lightbox-arrow gallery-lightbox-prev"
            type="button"
            aria-label="Image précédente"
          >
            ←
          </button>
          <button
            class="gallery-lightbox-arrow gallery-lightbox-next"
            type="button"
            aria-label="Image suivante"
          >
            →
          </button>
          <img src="" alt="" />
        </div>
      </div>
    </main>

    <script src="script.js"></script>
  </body>
</html>
