<!DOCTYPE html>
<html lang="fr" dir="ltr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mosquée Bilal - Galerie</title>
    <link rel="stylesheet" href="styles.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
      integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <style>
      body {
        background: #000;
      }
      .gallery-full-wrapper {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 16px;
      }
      .gallery-full-header {
        color: #fdfdfd;
        margin-bottom: 10px;
        font-size: 0.9rem;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        text-align: center;
      }
      .gallery-full-inner {
        width: min(1100px, 100%);
      }
      .gallery-full-inner .hero-slider {
        border-radius: 12px;
      }
      .gallery-full-inner .hero-slide img {
        max-height: 82vh;
      }
    </style>
  </head>
  <body>
    <div class="gallery-full-wrapper">
      <div class="gallery-full-header">
        Mosquée Bilal &mdash; Vue en grand
      </div>
      <div class="gallery-full-inner">
        <div class="hero-slider" id="mosque-slider-full">
          <div class="hero-slide active">
            <img src="assets/mosquee-1.png" alt="Vue extérieure moderne de la mosquée" />
          </div>
          <div class="hero-slide">
            <img src="assets/mosquee-2.png" alt="Façade avec motifs géométriques islamiques" />
          </div>
          <div class="hero-slide">
            <img src="assets/mosquee-3.png" alt="Intérieur de la mosquée avec coupole" />
          </div>
          <div class="hero-slide">
            <img src="assets/mosquee-4.png" alt="Intérieur lumineux de la salle de prière" />
          </div>
          <button class="hero-slider-btn prev" aria-label="Image précédente">
            <i class="fa-solid fa-chevron-left"></i>
          </button>
          <button class="hero-slider-btn next" aria-label="Image suivante">
            <i class="fa-solid fa-chevron-right"></i>
          </button>
          <div class="hero-dots"></div>
        </div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
