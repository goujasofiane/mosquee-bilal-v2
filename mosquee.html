<!DOCTYPE html>
<html lang="fr" dir="ltr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mosquée Bilal - Galerie</title>
    <link rel="stylesheet" href="styles.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
      integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <style>
      body {
        background: radial-gradient(circle at 0 0, #053628, #020908);
      }
      .gallery-full-wrapper {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 24px 16px;
      }
      .gallery-full-header {
        color: #fdf6e8;
        margin-bottom: 16px;
        font-size: 0.9rem;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        text-align: center;
      }
      .gallery-full-inner {
        width: min(900px, 100%);
        background: rgba(5, 19, 18, 0.9);
        border-radius: 26px;
        border: 1px solid rgba(200, 161, 91, 0.65);
        box-shadow: 0 28px 70px rgba(0, 0, 0, 0.85);
        padding: 18px;
      }
      .gallery-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 12px;
      }
      .gallery-item {
        position: relative;
        border-radius: 18px;
        overflow: hidden;
        background: #000;
        box-shadow: 0 14px 34px rgba(0, 0, 0, 0.6);
        transition: transform 0.22s ease-out, box-shadow 0.22s ease-out,
          border-color 0.22s ease-out;
        border: 1px solid rgba(200, 161, 91, 0.4);
      }
      .gallery-item::after {
        content: "";
        position: absolute;
        inset: 0;
        background: radial-gradient(
          circle at 0 0,
          rgba(200, 161, 91, 0.18),
          transparent 60%
        );
        opacity: 0;
        transition: opacity 0.22s ease-out;
      }
      .gallery-item img {
        display: block;
        width: 100%;
        height: 100%;
        max-height: 260px;
        object-fit: cover;
        transition: transform 0.22s ease-out;
      }
      .gallery-item:hover {
        transform: scale(1.03);
        box-shadow: 0 20px 55px rgba(0, 0, 0, 0.9);
        border-color: rgba(241, 221, 156, 0.95);
      }
      .gallery-item:hover img {
        transform: scale(1.05);
      }
      .gallery-item:hover::after {
        opacity: 1;
      }
      @media (max-width: 640px) {
        .gallery-full-inner {
          padding: 14px;
        }
        .gallery-item img {
          max-height: 200px;
        }
      }
    </style>
  </head>
  <body>
    <div class="gallery-full-wrapper">
      <div class="gallery-full-header">
        Mosquée Bilal &mdash; Vue en grand
      </div>
      <div class="gallery-full-inner">
        <div class="gallery-grid">
          <figure class="gallery-item">
            <img src="assets/mosquee-1.png" alt="Vue extérieure moderne de la Mosquée Bilal" />
          </figure>
          <figure class="gallery-item">
            <img src="assets/mosquee-2.png" alt="Façade en bois et entrée de la Mosquée Bilal" />
          </figure>
          <figure class="gallery-item">
            <img src="assets/mosquee-3.png" alt="Grand espace intérieur en cours de finition" />
          </figure>
          <figure class="gallery-item">
            <img src="assets/mosquee-4.png" alt="Détails architecturaux et coupole de la Mosquée Bilal" />
          </figure>
        </div>
      </div>
    </div>

  </body>
</html>
