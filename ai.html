  <body class="nh-site nh-toggle-header-page">

        </div>
        <div class="nh-topbar-right">
          <a class="social-icon-circle" href="https://instagram.com" target="_blank" rel="noopener" aria-label="Instagram"><img src="assets/icon-instagram.png" alt="Instagram"></a>
          <a class="social-icon-circle" href="https://www.facebook.com/MosqueeBilal.ACMCM" target="_blank" rel="noopener" aria-label="Facebook"><img src="assets/icon-facebook.png" alt="Facebook"></a>
          <a class="social-icon-circle" href="https://tiktok.com" target="_blank" rel="noopener" aria-label="TikTok"><img src="assets/icon-tiktok.svg" alt="TikTok"></a>
          <a class="social-icon-circle" href="https://www.youtube.com/channel/UCqFvkR5CR2H0aakfThZopjQ" target="_blank" rel="noopener" aria-label="YouTube"><img src="assets/icon-youtube.svg" alt="YouTube"></a>
          <a class="social-icon-circle" href="https://wa.me/33123456789" target="_blank" rel="noopener" aria-label="WhatsApp"><img src="assets/icon-whatsapp.svg" alt="WhatsApp"></a>
          <a class="social-icon-circle" href="https://twitch.tv" target="_blank" rel="noopener" aria-label="Twitch"><img src="assets/icon-twitch.svg" alt="Twitch"></a>
          <a class="social-icon-circle" href="https://x.com" target="_blank" rel="noopener" aria-label="X"><img src="assets/icon-x.svg" alt="X"></a>
        </div>
      </div>
    </div>

    <button class="toggle-header-btn" type="button" aria-label="Masquer le menu du site">
      <span class="toggle-header-btn-icon" aria-hidden="true">▲</span>
    </button>

    <header class="nh-header">
      <div class="nh-header-inner">
        <a class="nh-brand" href="index.html" aria-label="Mosquée Bilal">
          <img src="assets/logo1.png" class="nh-brand-logo" alt="Logo Mosquée Bilal" />
          <span class="nh-brand-text">Mosquée Bilal</span>
        </a>

        <nav class="nh-nav" aria-label="Navigation principale">
          <button class="nh-nav-toggle" type="button" aria-label="Menu">
            <span></span><span></span><span></span>
          </button>
          <ul class="nh-nav-list">
            <li><a href="index.html" data-i18n="navHome">ACCUEIL</a></li>
            <li><a href="mosquee.html" data-i18n="navGallery">GALERIE</a></li>
            <li><a href="quran.html" data-i18n="navQuran">CORAN</a></li>
            <li><a href="ai.html" data-i18n="navHadiths">HADITHS</a></li>
            <li><a href="horaires.html" data-i18n="navSchedule">HORAIRES</a></li>
            <li><a href="donation.html" class="nh-nav-donate" data-i18n="navDonation">DON</a></li>
            <li><a href="location.html" data-i18n="navLocation">LOCALISATION</a></li>

          </ul>

        <div class="lang-switch nh-lang-switch">
          <button data-lang="fr" class="active">FR</button>

        </div>

    </header>

    <main class="nh-main" style="padding: 0;">
      <iframe 
        src="https://sunnah.com" 
        width="100%" 
        style="border: none; display: block; margin: 0; padding: 0;"
        allowfullscreen>
      </iframe>
    </main>

    <script>
      const toggleBtn = document.querySelector('.toggle-header-btn');
      const toggleIcon = toggleBtn
        ? toggleBtn.querySelector('.toggle-header-btn-icon')
        : null;
      const topBar =
        document.querySelector('.top-bar') || document.querySelector('.nh-topbar');
      const mainHeader =
        document.querySelector('.main-header') || document.querySelector('.nh-header');
      const iframe =
        document.querySelector('main iframe') ||
        document.querySelector('iframe');
      const footer = document.querySelector('footer');

      let headerVisible = true;

      function computeAndSetIframeHeight() {
        if (!iframe) return;

        if (window.matchMedia("(max-width: 768px)").matches) {
          iframe.style.setProperty("height", "calc(100vh - 120px)", "important");
          return;
        }

        iframe.style.removeProperty("height");

        const vh = window.innerHeight;
        const footerH = footer ? footer.getBoundingClientRect().height : 0;
        const topH = headerVisible && topBar ? topBar.getBoundingClientRect().height : 0;
        const headerH =
          headerVisible && mainHeader ? mainHeader.getBoundingClientRect().height : 0;

        const h = Math.max(0, vh - footerH - topH - headerH);
        iframe.style.height = h + "px";
      }

      function sync() {
        if (!toggleBtn) return;
        if (toggleIcon) {
          toggleIcon.textContent = headerVisible ? '▲' : '▼';
        }
        toggleBtn.setAttribute(
          'aria-label',
          headerVisible ? 'Masquer le menu du site' : 'Afficher le menu du site'
        );
        toggleBtn.setAttribute(
          'title',
          headerVisible ? 'Masquer le menu' : 'Afficher le menu'
        );

        document.body.classList.toggle('nh-header-hidden', !headerVisible);

        requestAnimationFrame(() => {
          requestAnimationFrame(computeAndSetIframeHeight);
        });
      }

      if (toggleBtn) {
        toggleBtn.addEventListener('click', () => {
          headerVisible = !headerVisible;
          sync();
        });
      }

      function initToggleTooltip() {
        if (!toggleBtn) return;
        const tip = document.createElement('div');
        tip.className = 'toggle-tooltip';
        tip.textContent = 'Appuyez pour cacher le menu';
        tip.setAttribute('role', 'tooltip');
        document.body.appendChild(tip);
        setTimeout(() => {
          tip.classList.add('hidden');
        }, 5000);
      }

      window.addEventListener('resize', computeAndSetIframeHeight);
      document.addEventListener('DOMContentLoaded', () => {
        headerVisible = true;
        document.body.classList.remove('nh-header-hidden');
        sync();
        initToggleTooltip();
      });
    </script>

    <script src="script.js"></script>
  </body>
</html>
